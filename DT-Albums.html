<!--  INICIO JS PARA MATCHEAR EL ANCHO DEL CONTADOR AL DEL CAROUSEL -->
<!-- Sync tape counter size to match the album carousel's actual rendered width. #image-carousel uses max-width, so its real width varies depending on available space; the tape counter's Grid needs an exact pixel width to   calculate its frame pieces correctly, so we measure the carousel live and recompute the counter's dimensions to match it precisely. Safe no-op on pages without #image-carousel (e.g. counter-only pages) — the function exits immediately if the carousel element isn't found. -->
<script>
  function ytSyncTapeCounterWidth() {
    var carousel = document.getElementById('image-carousel');
    var outer = document.querySelector('.tape-counter-outer');
    var wrap = document.querySelector('.tape-counter-wrap');
    if (!carousel || !outer || !wrap) return;

    var targetWidth = carousel.getBoundingClientRect().width;
    if (!targetWidth || targetWidth < 10) return; /* guard against measuring before layout settles */

    /* Same scale formula used throughout this project:
       scale = desired width / 686 (native assembled width of the frame pieces) */
    var scale = targetWidth / 686;
    var height       = Math.round(383 * scale);
    var leftCol      = Math.round(82  * scale);
    var rightCol     = Math.round(251 * scale);
    var topBottomRow = Math.round(66  * scale);

    outer.style.width  = targetWidth + 'px';
    outer.style.height = height + 'px';
    wrap.style.width   = targetWidth + 'px';
    wrap.style.height  = height + 'px';
    wrap.style.gridTemplateColumns = leftCol + 'px 1fr ' + rightCol + 'px';
    wrap.style.gridTemplateRows    = topBottomRow + 'px 1fr ' + topBottomRow + 'px';
  }

  /* Run after both Splide carousels have mounted and the browser has settled
     on a final layout. A short delay covers Splide's own initialization,
     similar to the delay we use elsewhere for the player's reflow fixes. */
  window.addEventListener('load', function () {
    setTimeout(ytSyncTapeCounterWidth, 150);
  });
  window.addEventListener('resize', function () {
    setTimeout(ytSyncTapeCounterWidth, 150);
  });
  window.addEventListener('orientationchange', function () {
    setTimeout(ytSyncTapeCounterWidth, 200);
    setTimeout(ytSyncTapeCounterWidth, 500); /* second pass for slower devices */
  });
</script> <!--  FIN JS PARA MATCHEAR EL ANCHO DEL CONTADOR AL DEL CAROUSEL -->
