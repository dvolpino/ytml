<html>
<head>
<meta charset="utf-8">

<title>YTML | MPlayer</title>
	
<!-- Google Fonts: Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="playerstyles.css" rel="stylesheet" type="text/css">
<link href="styles.css" rel="stylesheet" type="text/css">	
<link rel="icon" href="images/icons/favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="images/icons/favicon.ico" type="image/x-icon">
<link rel="manifest" href="manifest.json" />  <!-- PWA -->
<style>
  .yt-track-row.unavailable .yt-track-num,
  .yt-track-row.unavailable .yt-track-name,
  .yt-track-row.unavailable .yt-track-ch,
  .yt-track-row.unavailable .yt-track-duration {
    color: #888 !important;
  }
  .yt-track-row.unavailable {
    background: rgba(128, 128, 128, 0.10) !important;
  }
  .yt-track-row.unavailable::before {
    background: #888 !important;
  }
	

</style>
</head>
<body>
	
<header class="site-header"> <a class="logo-link"> <img src="images/logo.webp" alt="Logo" class="logo-img" width="675" height="127" onclick="history.back()" /> </a> </header>
<footer class="cuerpo">
  <nav>
  	
  <div class="yt-player-wrap">
  <div class="yt-video-wrapper">
    <div id="yt-player">
      <div class="yt-empty" id="yt-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <span>No playlist selected</span>
      </div>
    </div>
    <div id="yt-cover-wrap" style="display:none; position:absolute; inset:0; cursor:pointer; z-index:10;" onclick="ytStartFromCover()">
      <img id="yt-cover-img" src="" alt="" style="width:100%; height:100%; object-fit:cover; display:block;"/>
      <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.25);">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="36" cy="36" r="36" fill="rgba(0,0,0,0.5)"/>
          <polygon points="28,20 56,36 28,52" fill="white"/>
        </svg>
      </div>
    </div>
    <div id="nas-player" style="display:none; width:100%; background:#111; position:relative;">
      <img id="nas-album-art" src="" alt="Album Art"
           style="width:100%; aspect-ratio:1/1; object-fit:cover; display:block;"/>
      <audio id="nas-audio" preload="auto"></audio>
      <div id="nas-progress-wrap" style="position:absolute; left:0; right:0; bottom:0; padding:10px 10px 8px;
           background:linear-gradient(to top, rgba(0,0,0,0.65), transparent);">
        <input type="range" id="nas-progress" min="0" max="0" value="0" step="0.1"
               style="width:100%; display:block; margin:0; cursor:pointer;"
               oninput="nasSeekPreview(this)" onchange="nasSeekCommit(this)"
               onmousedown="nasSeeking = true;" onmouseup="nasSeeking = false;"
               ontouchstart="nasSeeking = true;" ontouchend="nasSeeking = false;"/>
      </div>
    </div>
  </div>
  <style>
    #nas-progress-wrap {
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    #nas-player:hover #nas-progress-wrap { opacity: 1; pointer-events: auto; }
    #nas-progress {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }
    #nas-progress::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
    }
    #nas-progress::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #ff0000;
      margin-top: -4px;
      cursor: pointer;
    }
    #nas-progress::-moz-range-track {
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
    }
    #nas-progress::-moz-range-thumb {
      width: 12px; height: 12px;
      border: none;
      border-radius: 50%;
      background: #ff0000;
      cursor: pointer;
    }
  </style>
  <div class="yt-controls">
    <button id="yt-shuffle" onclick="ytToggleShuffle()" title="Shuffle">
      <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/>
        <line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/>
        <line x1="15" y1="15" x2="21" y2="21"/>
      </svg>
    </button>
    <button id="nas-prev" onclick="nasPrev()" title="Previous" style="display:none;">
      <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
      </svg>
    </button>
    <button id="nas-playpause" onclick="nasPlayPause()" title="Play / Pause" style="display:none;">
      <svg id="nas-pp-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" stroke="none">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
    </button>
    <button id="nas-next" onclick="nasNext()" title="Next" style="display:none;">
      <svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
      </svg>
    </button>
    <div class="yt-track-info">
      <span id="yt-track-title"></span>
    </div>
    <span id="yt-time-display"></span>
  </div>
  <div class="yt-playlist">
    <div class="yt-playlist-header">
      <span id="yt-playlist-name">Playlist</span>
      <span id="yt-playlist-count"></span>
    </div>
    <div class="yt-playlist-list" id="yt-playlist-list">
      <div class="yt-playlist-loading" id="yt-playlist-loading">Select a playlist to begin.</div>
    </div>
  </div>
  </div>
  </nav>
<script src="background-manager.js"></script>
<script>
  var params      = new URLSearchParams(window.location.search);
  var NAS_MODE    = params.get('source') === 'nas';
  var YT_LIST_ID  = params.get('list')   || '';
  var YT_NAME     = params.get('name')   || 'Playlist';
  var YT_COLOR    = params.get('color')  || '';
  var YT_LBLCOLOR = params.get('labelcolor') || '';
  var YT_THUMB    = params.get('thumb')  || '';
  var NAS_PLAYLIST_URL = params.get('playlist') || '';
  var NAS_BASE_URL     = params.get('base')     || '';
  if (YT_NAME) document.getElementById('yt-playlist-name').textContent = decodeURIComponent(YT_NAME);
  if (YT_COLOR) {
    var styleEl = document.createElement('style');
    styleEl.textContent = [
      '.yt-track-row.active::before { background: ' + YT_COLOR + ' !important; }',
      '.yt-track-row.active .yt-track-num { color: ' + YT_COLOR + ' !important; }',
      '.yt-track-row.active .yt-track-name { color: ' + YT_COLOR + ' !important; }',
      '.yt-track-row.active { background: color-mix(in srgb, ' + YT_COLOR + ' 8%, transparent) !important; }'
    ].join('\n');
    document.head.appendChild(styleEl);
  }
  if (YT_LBLCOLOR) {
    var lblEl = document.createElement('style');
    lblEl.textContent = '#yt-playlist-name { color: ' + YT_LBLCOLOR + ' !important; }';
    document.head.appendChild(lblEl);
  }
  var ytTracks      = [];
  var ytCurrentIndex = 0;
  var ytShuffleOn   = false;
  var ytTimerInterval = null;
  function ytToggleShuffle() {
    ytShuffleOn = !ytShuffleOn;
    if (!NAS_MODE && typeof ytPlayer !== 'undefined' && ytPlayer) {
      ytPlayer.setShuffle(ytShuffleOn);
    }
    if (NAS_MODE) nasApplyShuffle();
    var btn = document.getElementById('yt-shuffle');
    btn.style.opacity = ytShuffleOn ? '1' : '0.35';
    btn.style.filter  = ytShuffleOn ? 'brightness(2)' : 'brightness(1)';
    btn.title = ytShuffleOn ? 'Shuffle: On' : 'Shuffle: Off';
  }
  var nasAudio       = null;
  var nasOrder       = [];
  var nasOrderPos    = 0;
  var nasSeeking     = false;
  var nasAutoPlayIntent    = false;
  var nasConsecutiveErrors = 0;
  if (NAS_MODE) {
    document.getElementById('yt-player').style.display    = 'none';
    document.getElementById('nas-player').style.display   = 'block';
    document.getElementById('nas-prev').style.display     = 'inline-flex';
    document.getElementById('nas-playpause').style.display= 'inline-flex';
    document.getElementById('nas-next').style.display     = 'inline-flex';
    nasAudio = document.getElementById('nas-audio');
    nasAudio.addEventListener('ended', function() {
      if (!ytShuffleOn && nasOrderPos >= nasOrder.length - 1) return;
      nasNext();
    });
    nasAudio.addEventListener('error', function() {
      if (!nasAudio.src) return;
      nasConsecutiveErrors++;
      console.warn('NAS track unavailable, skipping:', ytTracks[ytCurrentIndex] && ytTracks[ytCurrentIndex].src);
      var deadRow = document.getElementById('yt-row-' + ytCurrentIndex);
      if (deadRow) deadRow.classList.add('unavailable');
      if (nasConsecutiveErrors >= Math.max(ytTracks.length, 1)) {
        document.getElementById('yt-playlist-loading').textContent = 'No tracks could be loaded.';
        return;
      }
      nasSkipToNext(nasAutoPlayIntent);
    });
    nasAudio.addEventListener('canplay', function() {
      nasConsecutiveErrors = 0;
      var loadedRow = document.getElementById('yt-row-' + ytCurrentIndex);
      if (loadedRow) loadedRow.classList.remove('unavailable');
    });
    nasAudio.addEventListener('timeupdate', function() {
      if (!nasAudio.duration) return;
      document.getElementById('yt-time-display').textContent =
        ytFmtTime(nasAudio.currentTime) + ' / ' + ytFmtTime(nasAudio.duration);
      if (!nasSeeking) {
        var bar = document.getElementById('nas-progress');
        if (bar) bar.value = nasAudio.currentTime;
      }
    });
    nasAudio.addEventListener('loadedmetadata', function() {
      var bar = document.getElementById('nas-progress');
      if (bar) bar.max = nasAudio.duration || 0;
    });
    nasAudio.addEventListener('play',  function() { nasSetIcon(true);  });
    nasAudio.addEventListener('pause', function() { nasSetIcon(false); });
    if (NAS_PLAYLIST_URL) {
      document.getElementById('yt-playlist-loading').textContent = 'Loading playlist…';
      var isM3U = NAS_PLAYLIST_URL.toLowerCase().match(/\.m3u8?(\?|$)/);
      fetch(NAS_PLAYLIST_URL)
        .then(function(r) { return r.text(); })
        .then(function(text) {
          if (isM3U) {
            ytTracks = nasParseM3U(text, NAS_BASE_URL || nasBaseFromUrl(NAS_PLAYLIST_URL));
          } else {
            var data = JSON.parse(text);
            if (data.name) document.getElementById('yt-playlist-name').textContent = data.name;
            ytTracks = data.tracks || [];
          }
          nasApplyShuffle();
          nasRenderPlaylist();
          nasUpdateCount();
          nasLoadTrack(0, false);
        })
        .catch(function(err) {
          document.getElementById('yt-playlist-loading').textContent = 'No se pudo cargar la playlist del NAS. ¿Tenés Tailscale conectado en este dispositivo?';
          console.error('NAS playlist load error:', err);
        });
    } else {
      document.getElementById('yt-playlist-loading').textContent = 'No playlist URL provided.';
    }
  }
  function nasBaseFromUrl(url) {
    return url.substring(0, url.lastIndexOf('/') + 1);
  }
  function nasParseM3U(text, baseUrl) {
    if (baseUrl && baseUrl.slice(-1) !== '/') baseUrl += '/';
    var lines   = text.split(/\r?\n/);
    var tracks  = [];
    var pending = { title: '', artist: '', duration: 0 };
    lines.forEach(function(line) {
      line = line.trim();
      if (!line || line === '#EXTM3U') return;
      if (line.startsWith('#EXTINF:')) {
        var comma = line.indexOf(',');
        if (comma !== -1) {
          pending.duration = parseInt(line.substring(8, comma)) || 0;
          var meta = line.substring(comma + 1).trim();
          var dash = meta.indexOf(' - ');
          if (dash !== -1) {
            pending.artist = meta.substring(0, dash).trim();
            pending.title  = meta.substring(dash + 3).trim();
          } else {
            pending.artist = '';
            pending.title  = meta;
          }
        }
      } else if (!line.startsWith('#')) {
        var src = line;
        if (src && !src.match(/^https?:\/\//)) {
          src = baseUrl + src;
        }
        tracks.push({
          title:    pending.title  || src.split('/').pop(),
          artist:   pending.artist || '',
          src:      src,
          folder:   baseUrl,
          duration: pending.duration
        });
        pending = { title: '', artist: '', duration: 0 };
      }
    });
    return tracks;
  }
  function nasApplyShuffle() {
    nasOrder = ytTracks.map(function(_, i) { return i; });
    if (ytShuffleOn) {
      for (var i = nasOrder.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = nasOrder[i]; nasOrder[i] = nasOrder[j]; nasOrder[j] = tmp;
      }
    }
    var curTrackIdx = nasOrder[nasOrderPos] !== undefined ? nasOrder[nasOrderPos] : 0;
    nasOrderPos = nasOrder.indexOf(curTrackIdx);
    if (nasOrderPos === -1) nasOrderPos = 0;
  }
  function nasRenderPlaylist() {
    var list = document.getElementById('yt-playlist-list');
    list.innerHTML = '';
    ytTracks.forEach(function(track, i) {
      var row = document.createElement('div');
      row.className = 'yt-track-row' + (i === ytCurrentIndex ? ' active' : '');
      row.id = 'yt-row-' + i;
      row.onclick = (function(idx) {
        return function() {
          nasOrderPos = nasOrder.indexOf(idx);
          if (nasOrderPos === -1) { nasOrder.unshift(idx); nasOrderPos = 0; }
          nasLoadTrack(nasOrderPos, true);
        };
      })(i);
      row.innerHTML =
        '<span class="yt-track-num">' + (i + 1) + '</span>' +
        '<img class="yt-track-thumb" src="' + track.folder + 'folder.jpg" loading="lazy" alt="" ' +
             'onerror="this.style.visibility=\'hidden\'"/>' +
        '<div class="yt-track-meta">' +
          '<div class="yt-track-name" id="yt-name-' + i + '">' + (track.title || '') + '</div>' +
          '<div class="yt-track-ch"  id="yt-ch-'   + i + '">' + (track.artist || '') + '</div>' +
        '</div>' +
        '<span class="yt-track-duration" id="yt-dur-' + i + '"></span>';
      list.appendChild(row);
    });
    nasLoadDurations();
  }
  function nasLoadTrack(orderPos, autoPlay) {
    nasOrderPos   = orderPos;
    var trackIdx  = nasOrder[orderPos];
    var track     = ytTracks[trackIdx];
    if (!track) return;
    ytCurrentIndex = trackIdx;
    nasAutoPlayIntent = autoPlay;
    document.getElementById('nas-album-art').src = track.folder + 'folder.jpg';
    nasAudio.src = track.src;
    nasAudio.load();
    if (autoPlay) nasAudio.play();
    var progressBar = document.getElementById('nas-progress');
    if (progressBar) { progressBar.value = 0; progressBar.max = 0; }
    document.getElementById('yt-track-title').textContent =
      (track.artist ? track.artist + ' — ' : '') + (track.title || '');
    ytHighlightActive();
  }
  function nasLoadDurations() {
    ytTracks.forEach(function(track, i) {
      if (track.duration && track.duration > 0) {
        var el = document.getElementById('yt-dur-' + i);
        if (el) el.textContent = ytFmtTime(track.duration);
      } else {
        var a = new Audio();
        a.preload = 'metadata';
        a.src = track.src;
        a.addEventListener('loadedmetadata', (function(idx, audio) {
          return function() {
            var el = document.getElementById('yt-dur-' + idx);
            if (el) el.textContent = ytFmtTime(audio.duration);
            nasUpdateCount();
          };
        })(i, a));
      }
    });
    nasUpdateCount();
  }
  function nasUpdateCount() {
    var total = 0;
    ytTracks.forEach(function(_, i) {
      var el = document.getElementById('yt-dur-' + i);
      if (el && el.textContent) total += ytSecondsFromText(el.textContent);
    });
    var countText = ytTracks.length + ' tracks';
    if (total > 0) countText += ' · ' + ytFmtTotal(total);
    document.getElementById('yt-playlist-count').textContent = countText;
  }
  function nasPlayPause() {
    if (!nasAudio) return;
    nasAudio.paused ? nasAudio.play() : nasAudio.pause();
  }
  function nasSeekPreview(bar) {
    if (!nasAudio) return;
    document.getElementById('yt-time-display').textContent =
      ytFmtTime(parseFloat(bar.value)) + ' / ' + ytFmtTime(nasAudio.duration || 0);
  }
  function nasSeekCommit(bar) {
    if (!nasAudio) return;
    nasAudio.currentTime = parseFloat(bar.value);
    nasSeeking = false;
  }
  function nasPrev() {
    if (nasOrderPos > 0) {
      nasLoadTrack(nasOrderPos - 1, !nasAudio.paused);
    } else {
      nasLoadTrack(nasOrder.length - 1, !nasAudio.paused);
    }
  }
  function nasNext() {
    nasSkipToNext(true);
  }
  function nasSkipToNext(autoPlay) {
    if (nasOrderPos < nasOrder.length - 1) {
      nasLoadTrack(nasOrderPos + 1, autoPlay);
    } else {
      nasLoadTrack(0, autoPlay);
    }
  }
  function nasSetIcon(playing) {
    var icon = document.getElementById('nas-pp-icon');
    if (!icon) return;
    icon.innerHTML = playing
      ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
      : '<polygon points="5 3 19 12 5 21 5 3"/>';
  }
  var ytPlayer, ytReady = false;
  var ytConsecutiveErrors = 0;
  var ytStuckWatchdog  = null;
  var ytStuckTrackId   = null;
  var YT_STATE_NAMES = { '-1': 'UNSTARTED', 0: 'ENDED', 1: 'PLAYING', 2: 'PAUSED', 3: 'BUFFERING', 5: 'CUED' };
  function ytMarkUnavailable(idx) {
    if (idx == null || idx < 0 || idx >= ytTracks.length) return;
    var row = document.getElementById('yt-row-' + idx);
    if (row) row.classList.add('unavailable');
  }
  function ytSkipDeadTrack(reason) {
    var deadIdx = null;
    try { deadIdx = ytPlayer.getPlaylistIndex(); } catch (err) {}
    console.warn('[YT watchdog] SKIPPING — track unavailable (' + reason + '), index', ytCurrentIndex);
    ytMarkUnavailable(deadIdx);
    ytConsecutiveErrors++;
    if (ytConsecutiveErrors >= Math.max(ytTracks.length, 1)) {
      console.error('[YT watchdog] All tracks in this playlist failed to play — stopping auto-skip.');
      return;
    }
    try {
      ytPlayer.nextVideo();
    } catch (err) {
      console.error('[YT watchdog] nextVideo() threw:', err);
    }
  }
  function ytClearStuckWatchdog() {
    if (ytStuckWatchdog) { clearTimeout(ytStuckWatchdog); ytStuckWatchdog = null; }
    ytStuckTrackId = null;
  }
  function ytArmStuckWatchdog() {
    var id = null;
    try { id = ytPlayer.getVideoData().video_id; } catch (err) { console.error('[YT watchdog] getVideoData() threw in ytArmStuckWatchdog:', err); }
    if (ytStuckWatchdog && ytStuckTrackId === id) {
      return;
    }
    ytClearStuckWatchdog();
    ytStuckTrackId = id;
    var startTime = 0;
    try { startTime = ytPlayer.getCurrentTime(); } catch (err) { console.error('[YT watchdog] getCurrentTime() threw in ytArmStuckWatchdog:', err); }
    ytStuckWatchdog = setTimeout(function () {
      ytStuckWatchdog = null;
      if (!ytPlayer) return;
      try {
        var state = ytPlayer.getPlayerState();
        var nowTime = ytPlayer.getCurrentTime();
        if (state === YT.PlayerState.PLAYING) return;
        if (nowTime - startTime < 0.5) {
          ytSkipDeadTrack('stuck, no onError fired — state was ' + (YT_STATE_NAMES[state] || state));
        }
      } catch (err) {
        console.error('[YT watchdog] check callback threw:', err);
      }
    }, 5000);
  }
  var ytPollInterval = null;
  var ytPollTrack = { id: undefined, since: 0 };
  var ytPlaybackIntended = false;
  function ytStartPolling() {
    if (ytPollInterval) return;
    ytPollInterval = setInterval(ytPollCheck, 1500);
  }
  function ytPollCheck() {
    if (!ytPlayer) return;
    var id, state, cur;
    try {
      id = ytPlayer.getVideoData().video_id;
      state = ytPlayer.getPlayerState();
      cur = ytPlayer.getCurrentTime();
    } catch (err) {
      console.error('[YT poll] query threw:', err);
      return;
    }
    if (id !== ytPollTrack.id) {
      ytPollTrack = { id: id, since: Date.now() };
      return;
    }
    var neverStarted = (state === -1 || state === 5);
    if (!ytPlaybackIntended || !neverStarted) return;
    var stuckMs = Date.now() - ytPollTrack.since;
    if (stuckMs >= 6000) {
      console.warn('[YT poll] track', id, 'stuck in', (YT_STATE_NAMES[state] || state), 'for', stuckMs, 'ms with no events firing — treating as a silently-failed auto-advance');
      ytPollTrack = { id: undefined, since: 0 };
      ytSkipDeadTrack('silent auto-advance failure (poll-detected), stuck in ' + (YT_STATE_NAMES[state] || state));
    }
  }
  if (!NAS_MODE && YT_THUMB && YT_LIST_ID) {
    document.getElementById('yt-cover-img').src = decodeURIComponent(YT_THUMB);
    document.getElementById('yt-cover-wrap').style.display = 'block';
  }
  window.onYouTubeIframeAPIReady = function () {
    if (NAS_MODE || !YT_LIST_ID) return;
    document.getElementById('yt-empty').style.display = 'none';
    document.getElementById('yt-playlist-loading').textContent = 'Loading tracks…';
    ytPlayer = new YT.Player('yt-player', {
      height: '100%',
      width: '100%',
      playerVars: {
        listType: 'playlist',
        list: YT_LIST_ID,
        autoplay: 0,
        playsinline: 1,
        rel: 0,
        modestbranding: 1,
        origin: 'https://dvolpino.github.io'
      },
      events: {
        onReady: function () {
          var iframe = document.querySelector('#yt-player iframe');
          if (iframe) iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
          ytReady = true;
          setTimeout(ytBuildPlaylist, 1500);
          ytStartPolling();
        },
        onStateChange: function (e) {
          if (e.data === YT.PlayerState.PLAYING) {
            document.getElementById('yt-cover-wrap').style.display = 'none';
            ytStartTimer();
            ytConsecutiveErrors = 0;
            ytClearStuckWatchdog();
            ytPlaybackIntended = true;
          } else {
            if (e.data === YT.PlayerState.ENDED || e.data === YT.PlayerState.PAUSED) {
              ytStopTimer();
            }
            var isLegitimateEnd = false;
            if (e.data === YT.PlayerState.ENDED && !ytShuffleOn) {
              try {
                isLegitimateEnd = (ytPlayer.getPlaylistIndex() === ytTracks.length - 1);
              } catch (err) {}
            }
            if (e.data === YT.PlayerState.PAUSED || isLegitimateEnd) {
              ytClearStuckWatchdog();
            } else {
              ytArmStuckWatchdog();
            }
          }
          ytUpdateTitle();
          if (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.PAUSED) {
            try {
              var currentId = ytPlayer.getVideoData().video_id;
              var foundIndex = ytTracks.findIndex(function(t) { return t.id === currentId; });
              if (foundIndex !== -1) {
                ytCurrentIndex = foundIndex;
                ytHighlightActive();
                var playedRow = document.getElementById('yt-row-' + foundIndex);
                if (playedRow) playedRow.classList.remove('unavailable');
              }
            } catch(err) { console.error('[YT state] video-id match block threw:', err); }
          }
        },
        onError: function (e) {
          console.warn('[YT onError] fired with code', e.data);
          ytClearStuckWatchdog();
          ytSkipDeadTrack('error code ' + e.data);
        }
      }
    });
  };
  function ytBuildPlaylist() {
    try {
      var ids = ytPlayer.getPlaylist();
      if (!ids || ids.length === 0) { setTimeout(ytBuildPlaylist, 1000); return; }
      ytTracks = ids.map(function(id, i) { return { id: id, title: 'Track ' + (i+1), channel: '' }; });
      ytRenderPlaylist();
      document.getElementById('yt-playlist-count').textContent = ids.length + ' tracks';
      ytFetchTitles();
    } catch(e) { setTimeout(ytBuildPlaylist, 1000); }
  }
  function ytRenderPlaylist() {
    var list = document.getElementById('yt-playlist-list');
    list.innerHTML = '';
    ytTracks.forEach(function(track, i) {
      var row = document.createElement('div');
      row.className = 'yt-track-row' + (i === ytCurrentIndex ? ' active' : '');
      row.id = 'yt-row-' + i;
      row.onclick = (function(idx) { return function() { ytPlayer.playVideoAt(idx); }; })(i);
      row.innerHTML =
        '<span class="yt-track-num">' + (i+1) + '</span>' +
        '<img class="yt-track-thumb" src="https://img.youtube.com/vi/' + track.id + '/mqdefault.jpg" loading="lazy" alt=""/>' +
        '<div class="yt-track-meta">' +
          '<div class="yt-track-name" id="yt-name-' + i + '">' + track.title + '</div>' +
          '<div class="yt-track-ch"  id="yt-ch-'   + i + '">' + track.channel + '</div>' +
        '</div>' +
        '<span class="yt-track-duration" id="yt-dur-' + i + '"></span>';
      list.appendChild(row);
    });
  }
  var YT_API_KEY = 'AIzaSyDS_LgpU7fBEpfG1tM3hMS9SO120aBlBwQ';
  var ytTotalSeconds = 0;
  function ytFetchTitles() {
    var ids = ytTracks.map(function(t) { return t.id; });
    for (var i = 0; i < ids.length; i += 50) {
      ytFetchBatch(ids.slice(i, i + 50), i);
    }
  }
  function ytFetchBatch(batchIds, offset) {
    var url = 'https://www.googleapis.com/youtube/v3/videos'
      + '?part=snippet,contentDetails'
      + '&id=' + batchIds.join(',')
      + '&key=' + YT_API_KEY;
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.items) return;
        data.items.forEach(function(item, j) {
          var idx = offset + j;
          var n = document.getElementById('yt-name-' + idx);
          var c = document.getElementById('yt-ch-' + idx);
          var d = document.getElementById('yt-dur-' + idx);
          if (n) n.textContent = item.snippet.title || '';
          if (c) c.textContent = (item.snippet.channelTitle || '').replace(/ - Topic$/, '').trim();
          if (d) d.textContent = ytParseDuration(item.contentDetails.duration);
        });
        ytTotalSeconds = 0;
        ytTracks.forEach(function(t, i) {
          var d = document.getElementById('yt-dur-' + i);
          if (d && d.textContent) ytTotalSeconds += ytSecondsFromText(d.textContent);
        });
        document.getElementById('yt-playlist-count').textContent =
          ytTracks.length + ' tracks · ' + ytFmtTotal(ytTotalSeconds);
      })
      .catch(function() {});
  }
  function ytParseDuration(iso) {
    if (!iso) return '';
    var m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return '';
    var h = parseInt(m[1] || 0), min = parseInt(m[2] || 0), sec = parseInt(m[3] || 0);
    if (h > 0) return h + ':' + ('0'+min).slice(-2) + ':' + ('0'+sec).slice(-2);
    return min + ':' + ('0'+sec).slice(-2);
  }
  function ytSecondsFromText(str) {
    var parts = str.split(':').map(Number);
    if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    if (parts.length === 2) return parts[0] * 60 + parts[1];
    return 0;
  }
  function ytFmtTotal(secs) {
    var h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
    if (h > 0) return h + ' hr' + (h > 1 ? 's' : '') + ', ' + m + ' min';
    return m + ' min';
  }
  function ytFmtTime(s) {
    s = Math.floor(s);
    var h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
    if (h > 0) return h + ':' + ('0'+m).slice(-2) + ':' + ('0'+sec).slice(-2);
    return m + ':' + ('0'+sec).slice(-2);
  }
  function ytHighlightActive() {
    document.querySelectorAll('.yt-track-row').forEach(function(el, i) {
      el.classList.toggle('active', i === ytCurrentIndex);
    });
    var active = document.getElementById('yt-row-' + ytCurrentIndex);
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function ytUpdateTitle() {
    try {
      var d = ytPlayer.getVideoData();
      document.getElementById('yt-track-title').textContent = d.title || '';
    } catch(e) {}
  }
  function ytStartTimer() {
    if (ytTimerInterval) clearInterval(ytTimerInterval);
    ytTimerInterval = setInterval(function() {
      if (!ytPlayer) return;
      try {
        var cur = ytPlayer.getCurrentTime(), dur = ytPlayer.getDuration();
        var el = document.getElementById('yt-time-display');
        if (el && dur > 0) el.textContent = ytFmtTime(cur) + ' / ' + ytFmtTime(dur);
      } catch(e) {}
    }, 500);
  }
  function ytStopTimer() {
    if (ytTimerInterval) { clearInterval(ytTimerInterval); ytTimerInterval = null; }
    var el = document.getElementById('yt-time-display');
    if (el) el.textContent = '';
  }
  function ytStartFromCover() {
    document.getElementById('yt-cover-wrap').style.display = 'none';
    if (ytPlayer) ytPlayer.playVideo();
  }
  /* CONFIRMED BUG (tested across 5 states): after rotating in EITHER direction,
     the Grid layout sizing .yt-player-wrap keeps using the PREVIOUS
     orientation's dimensions until the page is refreshed. We confirmed this
     persists even after forcing a full CSS file reload — meaning the problem
     is not CSS caching/parsing, but how the browser's Grid engine evaluates
     nested calc()/custom-property chains (--avail-h -> --video-h -> grid-
     template-rows/columns) specifically across an orientation change.
     Fix: bypass calc() and custom properties entirely at the point of
     application. JS computes the final pixel numbers directly from
     window.innerWidth/innerHeight (which DO update correctly and immediately
     on rotation) and writes them straight into grid-template-columns /
     grid-template-rows / height as plain pixel strings — no calc(), no
     var(), nothing for the Grid engine to "remember" incorrectly. */
  function ytApplyGridSizing() {
    var wrap = document.querySelector('.yt-player-wrap');
    if (!wrap) return;
    var w = window.innerWidth;
    var h = window.innerHeight;
    var isLandscapePhone = (w > h) && (w <= 932);
    /* Desktop/laptop landscape windows (>=933px wide). Originally left fully
       CSS-controlled via --avail-h: calc(100dvh - ...) in playerstyles.css,
       on the assumption that PC windows are rarely resized/rotated the way
       phones are. In practice, Chrome has a known bug where a dvh-based
       calc() chain (--avail-h -> --video-h -> grid-template-rows/columns)
       can get stuck on a STALE value and only recomputes after something
       forces a deeper reflow than a normal resize (confirmed: opening
       DevTools "fixes" it, a plain window resize does not) — same root
       cause as the orientation-change bug already fixed for phones above,
       just triggered by different events. Handled here the same way:
       compute plain pixel numbers from window.innerHeight directly, no
       calc()/var() for the engine to ever get stuck on. */
    var isLandscapeDesktop = (w > h) && (w >= 933) && (h <= 1080);
    if (isLandscapeDesktop) {
      var logoElD = document.querySelector('.site-header');
      var logoHeightD = logoElD ? logoElD.getBoundingClientRect().height : 106;
      /* NOT measured via getBoundingClientRect() on .yt-controls: it's a
         grid item, and grid items stretch to fill their assigned row by
         default — so its rendered height always just reflects whatever
         row height we last assigned it, creating a feedback loop (wrong
         height in -> same wrong height measured back out -> perpetuates
         itself). The intended height is simply 2.8rem (matches the
         original --controls-h custom property in playerstyles.css) —
         read the page's actual root font-size and convert that rem value
         to pixels directly, sidestepping the circular measurement. */
      var rootFontPx = parseFloat(getComputedStyle(document.documentElement).fontSize) || 14;
      var controlsHD = 2.8 * rootFontPx;
      var bodyCSD = getComputedStyle(document.body);
      var bodyVPadD = (parseFloat(bodyCSD.paddingTop) || 0) + (parseFloat(bodyCSD.paddingBottom) || 0);
      var availHD = h - logoHeightD - bodyVPadD;
      var videoHD = availHD - controlsHD;
      wrap.style.display = 'grid';
      wrap.style.gridTemplateColumns = videoHD + 'px 1fr';
      wrap.style.gridTemplateRows = videoHD + 'px ' + controlsHD + 'px';
      wrap.style.height = availHD + 'px';
      var videoWrapD = document.querySelector('.yt-video-wrapper');
      if (videoWrapD) {
        videoWrapD.style.width = videoHD + 'px';
        videoWrapD.style.height = videoHD + 'px';
      }
      var controlsElD = document.querySelector('.yt-controls');
      if (controlsElD) controlsElD.style.width = videoHD + 'px';
      var playlistD = document.querySelector('.yt-playlist');
      if (playlistD) playlistD.style.height = availHD + 'px';
      return;
    }
    if (!isLandscapePhone) {
      wrap.style.removeProperty('grid-template-columns');
      wrap.style.removeProperty('grid-template-rows');
      wrap.style.removeProperty('height');
      wrap.style.removeProperty('display');
      var videoWrapClear = document.querySelector('.yt-video-wrapper');
      if (videoWrapClear) {
        videoWrapClear.style.removeProperty('width');
        videoWrapClear.style.removeProperty('height');
      }
      var controlsClear = document.querySelector('.yt-controls');
      if (controlsClear) controlsClear.style.removeProperty('width');
      var playlistClear = document.querySelector('.yt-playlist');
      if (playlistClear) playlistClear.style.removeProperty('height');
      var isPortraitPhone = (h >= w) && (w <= 600);
      var playlistList = document.querySelector('.yt-playlist-list');
      if (isPortraitPhone && playlistList) {
        var PORTRAIT_PLAYLIST_EXTRA_PX = 0;
        var headerEl = document.querySelector('.site-header');
        var videoWrapEl = document.querySelector('.yt-video-wrapper');
        var controlsEl = document.querySelector('.yt-controls');
        var playlistHeaderEl = document.querySelector('.yt-playlist-header');
        var bodyCS = getComputedStyle(document.body);
        var bodyVPad = (parseFloat(bodyCS.paddingTop) || 0) + (parseFloat(bodyCS.paddingBottom) || 0);
        var usedHeight = bodyVPad;
        if (headerEl) usedHeight += headerEl.getBoundingClientRect().height;
        if (videoWrapEl) usedHeight += videoWrapEl.getBoundingClientRect().height;
        if (controlsEl) usedHeight += controlsEl.getBoundingClientRect().height;
        if (playlistHeaderEl) usedHeight += playlistHeaderEl.getBoundingClientRect().height;
        var remaining = h - usedHeight + PORTRAIT_PLAYLIST_EXTRA_PX;
        if (remaining < 120) remaining = 120;
        playlistList.style.maxHeight = remaining + 'px';
      } else if (playlistList) {
        playlistList.style.removeProperty('max-height');
      }
      return;
    }
    var logoEl = document.querySelector('.site-header');
    var logoHeight = logoEl ? logoEl.getBoundingClientRect().height : 106;
    var bottomPad = 0;
    var controlsH    = 45;
    var availH = h - logoHeight - bottomPad;
    var videoH = availH - controlsH;
    wrap.style.display = 'grid';
    wrap.style.gridTemplateColumns = videoH + 'px 1fr';
    wrap.style.gridTemplateRows = videoH + 'px ' + controlsH + 'px';
    wrap.style.height = availH + 'px';
    var videoWrap = document.querySelector('.yt-video-wrapper');
    if (videoWrap) {
      videoWrap.style.width = videoH + 'px';
      videoWrap.style.height = videoH + 'px';
    }
    var controls = document.querySelector('.yt-controls');
    if (controls) controls.style.width = videoH + 'px';
    var playlist = document.querySelector('.yt-playlist');
    if (playlist) playlist.style.height = availH + 'px';
  }
  window.addEventListener('orientationchange', function () {
    setTimeout(ytApplyGridSizing, 50);
    setTimeout(ytApplyGridSizing, 300);
  });
  window.addEventListener('resize', ytApplyGridSizing);
  ytApplyGridSizing();
  /* Re-check shortly after initial load too, same reasoning as the
     orientationchange handler above: the very first measurement can land
     before layout has fully settled (fonts, async resources), giving a
     wrong one-off reading that a later resize would have self-corrected
     anyway. Re-running a couple of times shortly after load catches that
     up front instead of waiting for the user to resize the window. */
  setTimeout(ytApplyGridSizing, 100);
  setTimeout(ytApplyGridSizing, 500);
</script>
